<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Server - Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: #333;
            margin: 0 0 0.5rem 0;
            font-size: 1.8rem;
        }
        .client-info {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #667eea;
        }
        .client-info p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }
        .client-name {
            font-weight: bold;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-button:hover {
            transform: translateY(-1px);
        }
        .login-button:active {
            transform: translateY(0);
        }
        .scope-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
        }
        .scope-info h3 {
            margin: 0 0 0.5rem 0;
            color: #856404;
            font-size: 1rem;
        }
        .scope-info p {
            margin: 0;
            color: #856404;
            font-size: 0.9rem;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Sign In</h1>
        </div>

        <div class="client-info">
            <p><span class="client-name">{{.client_name}}</span> is requesting access to your account.</p>
        </div>

        {{if .error}}
        <div class="error-message">
            {{.error}}
        </div>
        {{end}}

        <form method="post" action="/oauth/login">
            <!-- Hidden fields to preserve OAuth parameters -->
            <input type="hidden" name="client_id" value="{{.client_id}}">
            <input type="hidden" name="redirect_uri" value="{{.redirect_uri}}">
            <input type="hidden" name="scope" value="{{.scope}}">
            <input type="hidden" name="state" value="{{.state}}">
            <input type="hidden" name="code_challenge" value="{{.code_challenge}}">
            <input type="hidden" name="code_challenge_method" value="{{.code_challenge_method}}">

            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-button">Sign In</button>
        </form>

        {{if .scope}}
        <div class="scope-info">
            <h3>Requested Permissions</h3>
            <p>This application is requesting access to: <strong>{{.scope}}</strong></p>
        </div>
        {{end}}
    </div>
</body>
</html>
